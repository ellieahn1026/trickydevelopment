<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RupinGPT — hackedGPT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&family=Datatype:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./pretendard-kr.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-character="Rupin">
    <div class="screen">
      <div class="stage">
        <p class="archive-text" aria-hidden="true"></p>

        <header class="brand">
          <a href="./index.html"><h1>hackedGPT</h1></a>
        </header>

        <nav class="characters" aria-label="Characters">
          
          <button
            type="button"
            class="character"
            data-name="Potter"
            data-color="#ff399f"
            data-color-active="#ff0015"
            data-href="./index.html"
            aria-pressed="false"
            aria-label="Open Potter chat"
          >
            <span class="character__swatch" style="--swatch: #ff399f; --swatch-active: #ff0015"></span>
            <span class="character__label">Potter</span>
          </button>
          <button
            type="button"
            class="character is-active"
            data-name="Rupin"
            data-color="#ff5e00"
            data-color-active="#e1ff00"
            data-href="./rupin.html"
            aria-pressed="true"
            aria-label="Open Rupin chat"
          >
            <span class="character__swatch" style="--swatch: #ff5e00; --swatch-active: #e1ff00"></span>
            <span class="character__label">Rupin</span>
          </button>
          <button
            type="button"
            class="character"
            data-name="Tom"
            data-color="#54fe54"
            data-color-active="#00ffe1"
            data-href="./tom.html"
            aria-pressed="false"
            aria-label="Open Tom chat"
          >
            <span class="character__swatch" style="--swatch: #54fe54; --swatch-active: #00ffe1"></span>
            <span class="character__label">Tom</span>
          </button>
        </nav>

        <div class="sideline" aria-hidden="true"></div>

        <main class="chat-panel">
          <div class="chat-panel__thread" id="chat-thread" aria-live="polite"></div>
          <div class="chat-panel__composer" id="chat-composer">
            <p class="prompt__headline" id="chat-headline" data-default-headline="I know everything. Just Ask and Believe.">I know everything. Just Ask and Believe.</p>
            <form class="prompt__form" id="chat-form">
              <div class="prompt__field">
                <input
                  type="text"
                  id="chat-input"
                  name="message"
                  placeholder="Ask to RupinGPT"
                  autocomplete="off"
                  aria-label="Ask to RupinGPT"
                />
                <button type="submit" class="prompt__send ">Send</button>
              </div>
            </form>
          </div>
        </main>
      </div>
    </div>

    <script type="module" src="./nav.js"></script>
    <script type="module" src="./runaway-input.js"></script>
    <script type="module" src="./chat.js"></script>
  </body>
</html>
